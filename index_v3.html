<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undersea / Bipartite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#ffffff; --ink:#002191; --ink-soft:rgba(0,33,145,.62);
    --ink-faint:rgba(0,33,145,.28); --line:rgba(0,33,145,.09);
    --panel-bg:rgba(255,255,255,.88);
    --sans:'Inter',system-ui,sans-serif;
    --display:'Inter Tight','Inter',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);
    overflow:hidden;height:100%}
  canvas{display:block;position:fixed;inset:0;cursor:grab}
  canvas.dragging{cursor:grabbing}

  .title-block{position:fixed;top:1.5rem;left:1.5rem;z-index:5;pointer-events:none}
  .title-block h1{font-family:var(--display);font-size:15px;font-weight:700;letter-spacing:-.01em}
  .title-block p{font-size:11px;color:var(--ink-faint);margin-top:.2rem;font-weight:500;letter-spacing:.04em}

  .zoom-controls{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
    display:flex;gap:.4rem;z-index:5}
  .zoom-controls button{
    width:32px;height:32px;border-radius:6px;border:1px solid var(--line);
    background:var(--panel-bg);color:var(--ink);font-size:16px;cursor:pointer;
    backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
    transition:background .2s,border-color .2s;font-family:var(--sans)}
  .zoom-controls button:hover{background:rgba(0,33,145,.06);border-color:rgba(0,33,145,.2)}
  .zoom-controls button svg{width:15px;height:15px}

  .stats{position:fixed;bottom:1.5rem;left:1.5rem;font-size:11px;
    color:var(--ink-faint);font-weight:500;letter-spacing:.04em;z-index:5}
  .stats span{color:var(--ink-soft);font-weight:600}

  .hint{position:fixed;bottom:1.5rem;right:1.5rem;font-size:11px;
    color:var(--ink-faint);font-weight:500;letter-spacing:.04em;z-index:5}

  /* ── search ── */
  .search-wrap{position:fixed;top:1.5rem;right:1.5rem;z-index:5;display:flex;gap:.4rem}
  .search-input{
    appearance:none;background:var(--panel-bg);border:1px solid var(--line);
    border-radius:6px;padding:.35rem .7rem;font-family:var(--sans);
    font-size:12px;font-weight:500;color:var(--ink);backdrop-filter:blur(6px);
    outline:none;width:180px;transition:border-color .2s,width .25s}
  .search-input:focus{border-color:rgba(0,33,145,.3);width:220px}
  .search-input::placeholder{color:var(--ink-faint)}

  /* ── tooltip ── */
  .tooltip{
    position:fixed;pointer-events:none;background:rgba(0,33,145,.95);
    border-radius:6px;padding:.5rem .75rem;font-size:12px;color:#fff;
    max-width:300px;z-index:10;opacity:0;transition:opacity .1s ease;
    transform:translate(-50%,calc(-100% - 12px))}
  .tooltip.visible{opacity:1}
  .tooltip .t-name{font-family:var(--display);font-weight:700;font-size:13px;margin-bottom:.25rem}
  .tooltip .t-row{color:rgba(255,255,255,.6);font-size:11px;line-height:1.6}
  .tooltip .t-row strong{color:rgba(255,255,255,.9);font-weight:600}
</style>
</head>
<body>
<canvas id="viz"></canvas>

<div class="title-block">
  <h1>Undersea / Bipartite</h1>
  <p>Cables ← lines → owners · hover to highlight</p>
</div>

<div class="search-wrap">
  <input class="search-input" id="search" type="text" placeholder="Search cable or owner…" autocomplete="off">
</div>

<div class="zoom-controls">
  <button id="zoom-out">−</button>
  <button id="zoom-reset" title="Reset view">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
         stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
      <path d="M3 3v5h5"/>
    </svg>
  </button>
  <button id="zoom-in">+</button>
</div>

<div class="stats" id="stats"></div>
<div class="hint">scroll + ctrl to zoom · drag to pan</div>

<div class="tooltip" id="tooltip">
  <div class="t-name" id="t-name"></div>
  <div class="t-row" id="t-sub1"></div>
  <div class="t-row" id="t-sub2"></div>
  <div class="t-row" id="t-sub3"></div>
</div>

<script>
// ─── canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('viz');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  const pr = devicePixelRatio;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = W * pr; canvas.height = H * pr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(pr, pr);
  computeLayout();
  setDefaultView();
}
window.addEventListener('resize', resize);

// ─── layout constants (world space) ──────────────────────────────────────────
// Two vertical columns. Cables on the left, owners on the right.
// Row pitch chosen so 714 cables fit without overlap at a comfortable zoom.
const NC = RAW_CABLES.length;   // 714
const NO = RAW_OWNERS.length;   // 478

const ROW_PITCH = 18;           // px between rows (world space)
const COL_LEFT  = 0;            // x of cables column
const COL_RIGHT = 520;          // x of owners column — wide enough for labels
const DOT_R     = 3.5;          // dot radius (world)
const HIT_R     = 7;            // hover hit radius (world)

// total heights
const H_CABLES = (NC - 1) * ROW_PITCH;
const H_OWNERS = (NO - 1) * ROW_PITCH;
const WORLD_H  = Math.max(H_CABLES, H_OWNERS);

// node arrays — populated in computeLayout
let cableNodes = [];   // { cable, x, y, label }
let ownerNodes = [];   // { name, x, y, cableCount }
// links: { ci (cable idx), oi (owner idx) }
let links = [];

function computeLayout() {
  // cables: evenly spaced vertically, centred on world origin
  cableNodes = RAW_CABLES.map((c, i) => ({
    cable: c,
    x: COL_LEFT,
    y: -H_CABLES / 2 + i * ROW_PITCH,
    label: c.name,
  }));

  // owners: evenly spaced, same centre
  ownerNodes = RAW_OWNERS.map((name, i) => ({
    name,
    x: COL_RIGHT,
    y: -H_OWNERS / 2 + i * ROW_PITCH,
    cableCount: RAW_CABLES.filter(c => c.owners.includes(name)).length,
  }));

  // build owner name → index map
  const ownerIdx = {};
  RAW_OWNERS.forEach((name, i) => { ownerIdx[name] = i; });

  // links
  links = [];
  RAW_CABLES.forEach((c, ci) => {
    c.owners.forEach(owner => {
      const oi = ownerIdx[owner];
      if (oi !== undefined) links.push({ ci, oi });
    });
  });
}

// ─── pan / zoom ───────────────────────────────────────────────────────────────
const view  = { x:0, y:0, s:1 };
const vtgt  = { x:0, y:0, s:1 };
let drag = false, ds = {x:0,y:0}, vs = {x:0,y:0};

function setDefaultView() {
  // Fit the full height of both columns into the viewport with padding
  const pad  = 80;
  const fitH = (H + pad * 2) / (WORLD_H + ROW_PITCH * 4);
  // Also make sure the width fits
  const fitW = (W - 160) / (COL_RIGHT + 200);
  const s    = Math.min(fitH, fitW, 1);
  vtgt.s = s;
  vtgt.x = W / 2 - (COL_LEFT + COL_RIGHT) / 2 * s;
  vtgt.y = H / 2;
  view.s = vtgt.s; view.x = vtgt.x; view.y = vtgt.y;
}

function resetView() {
  const pad  = 80;
  const fitH = (H - pad * 2) / (WORLD_H + ROW_PITCH * 4);
  const fitW = (W - 160) / (COL_RIGHT + 200);
  const s    = Math.min(fitH, fitW, 1);
  vtgt.s = s;
  vtgt.x = W / 2 - (COL_LEFT + COL_RIGHT) / 2 * s;
  vtgt.y = H / 2;
}

canvas.addEventListener('mousedown', e => {
  drag = true; canvas.classList.add('dragging');
  ds = {x:e.clientX, y:e.clientY}; vs = {x:view.x, y:view.y};
});
window.addEventListener('mousemove', e => {
  if (drag) {
    view.x = vs.x + (e.clientX - ds.x);
    view.y = vs.y + (e.clientY - ds.y);
    vtgt.x = view.x; vtgt.y = view.y;
  }
  onHover(e);
});
window.addEventListener('mouseup', () => { drag = false; canvas.classList.remove('dragging'); });

canvas.addEventListener('wheel', e => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  const f  = Math.exp(-e.deltaY * 0.01);
  const ns = Math.min(Math.max(vtgt.s * f, 0.05), 20);
  const wx = (e.clientX - vtgt.x) / vtgt.s;
  const wy = (e.clientY - vtgt.y) / vtgt.s;
  vtgt.x = e.clientX - wx * ns;
  vtgt.y = e.clientY - wy * ns;
  vtgt.s = ns;
}, { passive: false });

canvas.addEventListener('dblclick', resetView);
document.getElementById('zoom-reset').addEventListener('click', resetView);
function zoomBy(f) {
  const ns = Math.min(Math.max(vtgt.s * f, 0.05), 20);
  const wx = (W/2 - vtgt.x) / vtgt.s;
  const wy = (H/2 - vtgt.y) / vtgt.s;
  vtgt.x = W/2 - wx * ns; vtgt.y = H/2 - wy * ns; vtgt.s = ns;
}
document.getElementById('zoom-in').addEventListener('click',  () => zoomBy(1.3));
document.getElementById('zoom-out').addEventListener('click', () => zoomBy(1/1.3));

function wx2s(x) { return x * view.s + view.x; }
function wy2s(y) { return y * view.s + view.y; }
function sx2w(x) { return (x - view.x) / view.s; }
function sy2w(y) { return (y - view.y) / view.s; }

// ─── search ───────────────────────────────────────────────────────────────────
let searchTerm = '';
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
});

// ─── hover ────────────────────────────────────────────────────────────────────
// hovered: { type:'cable'|'owner', idx }
let hovered = null;
const TT = document.getElementById('tooltip');

function onHover(e) {
  if (drag) { hovered = null; TT.classList.remove('visible'); return; }
  const mwx = sx2w(e.clientX), mwy = sy2w(e.clientY);

  let found = null;

  // check cable nodes
  for (let i = 0; i < cableNodes.length; i++) {
    const n = cableNodes[i];
    const dx = mwx - n.x, dy = mwy - n.y;
    if (dx*dx + dy*dy <= HIT_R*HIT_R) { found = {type:'cable', idx:i}; break; }
  }
  // check owner nodes
  if (!found) {
    for (let i = 0; i < ownerNodes.length; i++) {
      const n = ownerNodes[i];
      const dx = mwx - n.x, dy = mwy - n.y;
      if (dx*dx + dy*dy <= HIT_R*HIT_R) { found = {type:'owner', idx:i}; break; }
    }
  }

  hovered = found;

  if (found) {
    TT.classList.add('visible');
    TT.style.left = e.clientX + 'px';
    TT.style.top  = e.clientY + 'px';

    if (found.type === 'cable') {
      const c = cableNodes[found.idx].cable;
      document.getElementById('t-name').textContent = c.name;
      document.getElementById('t-sub1').innerHTML =
        `<strong>Owners</strong>&nbsp; ${c.owners.join(', ') || 'Unknown'}`;
      document.getElementById('t-sub2').innerHTML =
        c.rfs ? `<strong>RFS</strong>&nbsp; ${c.rfs}` : '';
      document.getElementById('t-sub3').innerHTML =
        c.length ? `<strong>Length</strong>&nbsp; ${c.length}` : '';
    } else {
      const o = ownerNodes[found.idx];
      document.getElementById('t-name').textContent = o.name;
      document.getElementById('t-sub1').innerHTML =
        `<strong>Cables</strong>&nbsp; ${o.cableCount}`;
      document.getElementById('t-sub2').innerHTML = '';
      document.getElementById('t-sub3').innerHTML = '';
    }
  } else {
    TT.classList.remove('visible');
  }
}
canvas.addEventListener('mouseleave', () => { hovered = null; TT.classList.remove('visible'); });

// ─── stats ────────────────────────────────────────────────────────────────────
document.getElementById('stats').innerHTML =
  `<span>${NC}</span> cables · <span>${NO}</span> owners · <span>${0}</span> connections`;

setTimeout(() => {
  document.getElementById('stats').innerHTML =
    `<span>${NC}</span> cables · <span>${NO}</span> owners · <span>${links.length}</span> connections`;
}, 100);

// ─── intro animation ──────────────────────────────────────────────────────────
const introStart = performance.now();
const INTRO_DUR  = 1400;
const STAGGER    = 500;
const TOTAL_N    = NC + NO;

function easeOutCubic(x) { return 1 - Math.pow(1-x, 3); }

function introP(globalIdx) {
  const elapsed = performance.now() - introStart;
  const delay   = (globalIdx / (TOTAL_N - 1)) * STAGGER;
  const t       = Math.max(0, elapsed - delay);
  if (t >= INTRO_DUR) return 1;
  return easeOutCubic(t / INTRO_DUR);
}

// ─── helpers ──────────────────────────────────────────────────────────────────
function isHighlighted(type, idx) {
  if (searchTerm) {
    if (type === 'cable') {
      const c = cableNodes[idx].cable;
      return c.name.toLowerCase().includes(searchTerm) ||
             c.owners.some(o => o.toLowerCase().includes(searchTerm));
    } else {
      return ownerNodes[idx].name.toLowerCase().includes(searchTerm);
    }
  }
  if (!hovered) return false;
  if (hovered.type === type && hovered.idx === idx) return true;
  // highlight connected nodes
  if (hovered.type === 'cable' && type === 'owner') {
    return links.some(l => l.ci === hovered.idx && l.oi === idx);
  }
  if (hovered.type === 'owner' && type === 'cable') {
    return links.some(l => l.oi === hovered.idx && l.ci === idx);
  }
  return false;
}

function isLinkHighlighted(l) {
  if (searchTerm) {
    const c = cableNodes[l.ci].cable;
    const o = ownerNodes[l.oi].name;
    return c.name.toLowerCase().includes(searchTerm) ||
           c.owners.some(x => x.toLowerCase().includes(searchTerm)) ||
           o.toLowerCase().includes(searchTerm);
  }
  if (!hovered) return false;
  if (hovered.type === 'cable') return l.ci === hovered.idx;
  if (hovered.type === 'owner') return l.oi === hovered.idx;
  return false;
}

const anyActive = () => hovered !== null || searchTerm !== '';

// ─── label font size (world space) ───────────────────────────────────────────
const LABEL_SIZE = 9;   // world px — stays crisp when zoomed
const LABEL_PAD  = 10;  // gap between dot and label start

// ─── render ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  // smooth pan/zoom
  view.x += (vtgt.x - view.x) * 0.12;
  view.y += (vtgt.y - view.y) * 0.12;
  view.s += (vtgt.s - view.s) * 0.12;

  ctx.save();
  ctx.translate(view.x, view.y);
  ctx.scale(view.s, view.s);

  const active = anyActive();

  // ── connection lines ──────────────────────────────────────────────────────
  links.forEach(l => {
    const cn = cableNodes[l.ci];
    const on = ownerNodes[l.oi];
    const p  = Math.min(introP(l.ci), introP(NC + l.oi));
    if (p < 0.01) return;

    const hi = isLinkHighlighted(l);

    let alpha, lw;
    if (hi) {
      alpha = 0.72 * p; lw = 1.2 / view.s;
    } else if (active) {
      alpha = 0.025 * p; lw = 0.5 / view.s;
    } else {
      alpha = 0.09 * p; lw = 0.55 / view.s;
    }

    // cubic bezier: handles pulled horizontally inward so lines arc gracefully
    const cpx1 = cn.x + (COL_RIGHT - COL_LEFT) * 0.42;
    const cpx2 = on.x - (COL_RIGHT - COL_LEFT) * 0.42;

    ctx.beginPath();
    ctx.moveTo(cn.x, cn.y);
    ctx.bezierCurveTo(cpx1, cn.y, cpx2, on.y, on.x, on.y);
    ctx.strokeStyle = `rgba(0,33,145,${alpha})`;
    ctx.lineWidth   = lw;
    ctx.stroke();
  });

  // ── cable dots + labels ───────────────────────────────────────────────────
  ctx.textAlign    = 'right';
  ctx.textBaseline = 'middle';
  ctx.font = `${LABEL_SIZE}px 'Inter', sans-serif`;

  cableNodes.forEach((n, i) => {
    const p  = introP(i);
    if (p < 0.02) return;
    const hi = isHighlighted('cable', i);

    const alpha = hi ? 1.0 : active ? 0.15 : 0.75;
    const r     = hi ? DOT_R * 1.7 : DOT_R;

    if (hi) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 4/view.s, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,33,145,0.2)';
      ctx.lineWidth   = 1/view.s;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,33,145,${alpha})`;
    ctx.fill();

    // label to the left of dot
    ctx.fillStyle = `rgba(0,33,145,${hi ? 0.9 : active ? 0.12 : 0.45})`;
    ctx.fillText(n.label, n.x - DOT_R - LABEL_PAD, n.y);
  });

  // ── owner dots + labels ───────────────────────────────────────────────────
  ctx.textAlign = 'left';

  ownerNodes.forEach((n, i) => {
    const p  = introP(NC + i);
    if (p < 0.02) return;
    const hi = isHighlighted('owner', i);

    const alpha = hi ? 1.0 : active ? 0.15 : 0.75;
    const r     = hi ? DOT_R * 1.7 : DOT_R;

    if (hi) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 4/view.s, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,33,145,0.2)';
      ctx.lineWidth   = 1/view.s;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,33,145,${alpha})`;
    ctx.fill();

    // label to the right of dot
    ctx.fillStyle = `rgba(0,33,145,${hi ? 0.9 : active ? 0.12 : 0.45})`;
    ctx.fillText(n.name, n.x + DOT_R + LABEL_PAD, n.y);
  });

  // ── column headers ────────────────────────────────────────────────────────
  const topC = cableNodes[0]  ? cableNodes[0].y  - 28 : -WORLD_H/2 - 28;
  const topO = ownerNodes[0] ? ownerNodes[0].y - 28 : -WORLD_H/2 - 28;
  const headerY = Math.min(topC, topO);

  ctx.font         = `600 10px 'Inter', sans-serif`;
  ctx.fillStyle    = 'rgba(0,33,145,0.35)';
  ctx.letterSpacing = '0.12em';

  ctx.textAlign = 'right';
  ctx.fillText('CABLES', COL_LEFT, headerY);
  ctx.textAlign = 'left';
  ctx.fillText('OWNERS', COL_RIGHT, headerY);

  ctx.restore();
  requestAnimationFrame(render);
}

// ─── boot ─────────────────────────────────────────────────────────────────────
resize();
computeLayout();
render();
</script>
</body>
</html>
