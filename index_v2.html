,[111,308],[111,313],[111,327],[111,350],[111,351],[111,369],[111,391],[111,392],[111,430],[111,443],[111,469],[111,488],[111,489],[111,500],[111,511],[111,512],[111,529],[111,534],[111,535],[111,547],[111,558],[111,577],[111,588],[111,595],[111,597],[111,613],[111,619],[111,623],[111,649],[111,650],[111,655],[111,656],[111,657],[111,682],[111,708],[111,709],[112,114],[112,115],[112,124],[112,127],[112,129],[112,147],[112,153],[112,158],[112,159],[112,160],[112,162],[112,163],[112,166],[112,171],[112,172],[112,173],[112,209],[112,211],[112,216],[112,217],[112,218],[112,256],[112,260],[112,261],[112,275],[112,288],[112,308],[112,313],[112,327],[112,350],[112,351],[112,369],[112,391],[112,392],[112,430],[112,443],[112,469],[112,488],[112,489],[112,500],[112,511],[112,512],[112,529],[112,534],[112,535],[112,547],[112,558],[112,577],[112,588],[112,595],[112,597],[112,613],[112,619],[112,623],[112,649],[112,650],[112,655],[112,656],[112,657],[112,682],[112,708],[112,709],[113,206],[113,272],[113,322],[113,332],[113,536],[113,636],[113,637],[114,115],[114,116],[114,127],[114,148],[114,150],[114,158],[114,159],[114,160],[114,171],[114,185],[114,187],[114,189],[114,190],[114,191],[114,216],[114,217],[114,218],[114,221],[114,222],[114,224],[114,242]];

<script>
// ─── canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('viz');
const ctx    = canvas.getContext('2d');
let W = 0, H = 0;

function resize() {
  const pr = devicePixelRatio;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width  = W * pr; canvas.height = H * pr;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(1,0,0,1,0,0);
  ctx.scale(pr, pr);
  setDefaultView();
}
window.addEventListener('resize', resize);

// ─── world-space circle — fixed large radius so 714 dots don't crowd ──────────
// 900px world radius → arc between adjacent dots ≈ 7.9px world
// Initial zoom scales this to fit the viewport.
const WORLD_R  = 900;
const WORLD_CX = 0;   // circle is centered at world origin
const WORLD_CY = 0;
const N        = RAW_CABLES.length;  // 714
const DOT_R    = 3.0;  // world-space dot radius — fits cleanly in 7.9px arc
const HIT_R    = 7.0;  // world-space hover hit radius

// ─── pan / zoom ───────────────────────────────────────────────────────────────
const view  = { x:0, y:0, s:1 };
const vtgt  = { x:0, y:0, s:1 };
let drag = false, ds = {x:0,y:0}, vs = {x:0,y:0};

// Default view: scale so ring is ~88% of the smaller viewport dimension
function setDefaultView() {
  const fit  = Math.min(W, H) * 0.88;
  const s    = fit / (WORLD_R * 2);
  vtgt.s = s; vtgt.x = W/2; vtgt.y = H/2;
  // snap immediately on first call (before render loop is running)
  view.s = s; view.x = W/2; view.y = H/2;
}

function resetView() {
  const fit = Math.min(W, H) * 0.88;
  vtgt.s = fit / (WORLD_R * 2);
  vtgt.x = W/2; vtgt.y = H/2;
}

canvas.addEventListener('mousedown', e => {
  drag = true; canvas.classList.add('dragging');
  ds = {x:e.clientX, y:e.clientY}; vs = {x:view.x, y:view.y};
});
window.addEventListener('mousemove', e => {
  if (drag) {
    view.x = vs.x + (e.clientX - ds.x);
    view.y = vs.y + (e.clientY - ds.y);
    vtgt.x = view.x; vtgt.y = view.y;
  }
  onHover(e);
});
window.addEventListener('mouseup', () => { drag = false; canvas.classList.remove('dragging'); });

canvas.addEventListener('wheel', e => {
  if (!e.ctrlKey) return;
  e.preventDefault();
  const f  = Math.exp(-e.deltaY * 0.01);
  const ns = Math.min(Math.max(vtgt.s * f, 0.1), 15);
  // zoom toward mouse
  const wx = (e.clientX - vtgt.x) / vtgt.s;
  const wy = (e.clientY - vtgt.y) / vtgt.s;
  vtgt.x = e.clientX - wx * ns;
  vtgt.y = e.clientY - wy * ns;
  vtgt.s = ns;
}, { passive: false });

canvas.addEventListener('dblclick', resetView);
document.getElementById('zoom-reset').addEventListener('click', resetView);

function zoomBy(f) {
  const ns = Math.min(Math.max(vtgt.s * f, 0.1), 15);
  const wx = (W/2 - vtgt.x) / vtgt.s;
  const wy = (H/2 - vtgt.y) / vtgt.s;
  vtgt.x = W/2 - wx * ns;
  vtgt.y = H/2 - wy * ns;
  vtgt.s = ns;
}
document.getElementById('zoom-in').addEventListener('click',  () => zoomBy(1.3));
document.getElementById('zoom-out').addEventListener('click', () => zoomBy(1/1.3));

// world → screen
function wx2s(x) { return x * view.s + view.x; }
function wy2s(y) { return y * view.s + view.y; }
// screen → world
function sx2w(x) { return (x - view.x) / view.s; }
function sy2w(y) { return (y - view.y) / view.s; }

// ─── data prep ────────────────────────────────────────────────────────────────
RAW_CABLES.sort((a, b) => {
  const ao = a.owners[0] || '\uffff', bo = b.owners[0] || '\uffff';
  return ao < bo ? -1 : ao > bo ? 1 : a.name < b.name ? -1 : 1;
});

const ownerCount = {};
RAW_CABLES.forEach(c => {
  const p = c.owners[0] || 'Unknown';
  ownerCount[p] = (ownerCount[p] || 0) + 1;
});
const topOwners = Object.entries(ownerCount).sort((a,b) => b[1]-a[1]).map(([n]) => n);

const sel = document.getElementById('owner-filter');
topOwners.forEach(name => {
  const o = document.createElement('option');
  o.value = name;
  o.textContent = `${name} (${ownerCount[name]})`;
  sel.appendChild(o);
});
let filterOwner = 'all';
sel.addEventListener('change', () => { filterOwner = sel.value; updateStats(); });

function updateStats() {
  const vis = filterOwner === 'all'
    ? N
    : RAW_CABLES.filter(c => (c.owners[0]||'Unknown') === filterOwner).length;
  document.getElementById('stats').innerHTML =
    `<span>${vis}</span> cable${vis!==1?'s':''} · <span>${RAW_LINKS.length}</span> connections`;
}

// ─── nodes: one per cable, evenly spaced on the circle ───────────────────────
const nodes = RAW_CABLES.map((cable, i) => {
  const angle = (i / N) * Math.PI * 2 - Math.PI / 2;
  return {
    cable,
    angle,
    // animated world-space position, starts at origin
    x: 0,
    y: 0,
  };
});

function nodeTarget(n) {
  return {
    x: WORLD_CX + Math.cos(n.angle) * WORLD_R,
    y: WORLD_CY + Math.sin(n.angle) * WORLD_R,
  };
}

// ─── intro animation ──────────────────────────────────────────────────────────
const introStart = performance.now();
const INTRO_DUR  = 1800;
const STAGGER    = 700;   // last node starts this many ms after first

function easeOutCubic(x) { return 1 - Math.pow(1-x, 3); }

function introP(i) {
  const elapsed = performance.now() - introStart;
  const delay   = (i / (N-1)) * STAGGER;
  const t       = Math.max(0, elapsed - delay);
  if (t >= INTRO_DUR) return 1;
  return easeOutCubic(t / INTRO_DUR);
}



// ─── hover ────────────────────────────────────────────────────────────────────
let hovered = null;
const TT = document.getElementById('tooltip');

function onHover(e) {
  if (drag || !nodes.length) {
    hovered = null; TT.classList.remove('visible'); return;
  }
  // mouse in world space
  const mwx = sx2w(e.clientX);
  const mwy = sy2w(e.clientY);

  let found = null;
  for (const n of nodes) {
    const dx = mwx - n.x, dy = mwy - n.y;
    if (dx*dx + dy*dy <= HIT_R*HIT_R) { found = n.cable; break; }
  }

  hovered = found;
  if (found) {
    TT.classList.add('visible');
    TT.style.left = e.clientX + 'px';
    TT.style.top  = e.clientY + 'px';
    document.getElementById('t-name').textContent = found.name;
    document.getElementById('t-owners').innerHTML =
      `<strong>Owners</strong>&nbsp; ${found.owners.join(', ') || 'Unknown'}`;
    document.getElementById('t-rfs').innerHTML =
      found.rfs ? `<strong>RFS</strong>&nbsp; ${found.rfs}` : '';
    document.getElementById('t-length').innerHTML =
      found.length ? `<strong>Length</strong>&nbsp; ${found.length}` : '';
    const lps = found.landing_points;
    document.getElementById('t-landing').innerHTML = lps.length
      ? `<strong>Lands at</strong>&nbsp; ${lps.slice(0,5).join(', ')}${lps.length>5?` +${lps.length-5} more`:''}`
      : '';
  } else {
    TT.classList.remove('visible');
  }
}
canvas.addEventListener('mouseleave', () => { hovered = null; TT.classList.remove('visible'); });

// ─── render ───────────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  // smooth pan/zoom
  view.x += (vtgt.x - view.x) * 0.12;
  view.y += (vtgt.y - view.y) * 0.12;
  view.s += (vtgt.s - view.s) * 0.12;

  // lerp nodes toward their circle positions
  nodes.forEach((n, i) => {
    const p   = introP(i);
    const spd = 0.018 + p * 0.075;
    const t   = nodeTarget(n);
    n.x += (t.x - n.x) * spd;
    n.y += (t.y - n.y) * spd;
  });

  // world→screen transform
  ctx.save();
  ctx.translate(view.x, view.y);
  ctx.scale(view.s, view.s);

  // ── guide ring ──
  ctx.beginPath();
  ctx.arc(WORLD_CX, WORLD_CY, WORLD_R, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(0,33,145,0.055)';
  ctx.lineWidth   = 1 / view.s;
  ctx.stroke();



  // ── connection lines ──
  RAW_LINKS.forEach(([ai, bi]) => {
    const na = nodes[ai], nb = nodes[bi];
    if (!na || !nb) return;

    const prog = Math.min(introP(ai), introP(bi));
    if (prog < 0.01) return;

    const ca = na.cable, cb = nb.cable;
    const eitherHov  = hovered === ca || hovered === cb;
    const aFilt = filterOwner !== 'all' && (ca.owners[0]||'Unknown') !== filterOwner;
    const bFilt = filterOwner !== 'all' && (cb.owners[0]||'Unknown') !== filterOwner;

    let alpha, lw;
    if (eitherHov) {
      alpha = 0.78 * prog; lw = 1.4 / view.s;
    } else if (filterOwner === 'all') {
      alpha = 0.10 * prog; lw = 0.6 / view.s;
    } else if (!aFilt && !bFilt) {
      alpha = 0.55 * prog; lw = 1.0 / view.s;
    } else if (aFilt && bFilt) {
      alpha = 0.02 * prog; lw = 0.5 / view.s;
    } else {
      alpha = 0.07 * prog; lw = 0.5 / view.s;
    }

    // bezier bowing toward center
    const pull = 0.36;
    const mx = (na.x + nb.x) / 2 * (1-pull) + WORLD_CX * pull;
    const my = (na.y + nb.y) / 2 * (1-pull) + WORLD_CY * pull;

    ctx.beginPath();
    ctx.moveTo(na.x, na.y);
    ctx.quadraticCurveTo(mx, my, nb.x, nb.y);
    ctx.strokeStyle = `rgba(0,33,145,${alpha})`;
    ctx.lineWidth   = lw;
    ctx.stroke();
  });

  // ── dots ──
  nodes.forEach((n, i) => {
    const prog = introP(i);
    if (prog < 0.02) return;

    const c         = n.cable;
    const isHov     = hovered === c;
    const isFiltered = filterOwner !== 'all' && (c.owners[0]||'Unknown') !== filterOwner;

    const r     = (isHov ? DOT_R * 1.8 : DOT_R) * (0.3 + 0.7 * prog);
    const alpha = isHov ? 1.0 : isFiltered ? 0.13 : 0.78;

    if (isHov) {
      ctx.beginPath();
      ctx.arc(n.x, n.y, r + 5 / view.s, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(0,33,145,0.22)';
      ctx.lineWidth   = 1 / view.s;
      ctx.stroke();
    }

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,33,145,${alpha})`;
    ctx.fill();
  });

  ctx.restore();
  requestAnimationFrame(render);
}

// ─── boot ─────────────────────────────────────────────────────────────────────
resize();
updateStats();
render();
</script>
